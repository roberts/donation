name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Configure Database for Testing
        run: |
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_HOST=127.0.0.1/# DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=3306/# DB_PORT=3306/' .env
          sed -i 's|DB_DATABASE=protocol|DB_DATABASE=database/database.sqlite|' .env
          sed -i 's/DB_USERNAME=root/# DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=/# DB_PASSWORD=/' .env

      - name: Run Migrations
        run: php artisan migrate --force

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: composer test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Start Application Server
        run: php artisan serve --host=127.0.0.1 --port=8000 &

      - name: Wait for Server
        run: |
          timeout 30 bash -c 'until curl -s http://127.0.0.1:8000 > /dev/null; do sleep 1; done'

      - name: Run Browser Tests
        run: composer test-browser
        env:
          APP_URL: http://127.0.0.1:8000

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-screenshots
          path: tests/Browser/Screenshots/
          retention-days: 7
